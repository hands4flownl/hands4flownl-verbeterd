{% if site.noindex == true %}
<meta name="robots" content="noindex, nofollow">
{% endif %}


<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- Open Graph – voor mooie previews op LinkedIn, Facebook en WhatsApp -->
<meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title"       content="{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url"         content="{{ page.url | absolute_url }}">
<meta property="og:site_name"   content="{{ site.title }}">
<meta property="og:locale"      content="nl_NL">
{% if page.afbeelding %}
<meta property="og:image" content="{{ page.afbeelding | absolute_url }}">
{% elsif page.layout == 'post' %}
<meta property="og:image" content="https://primary.jwwb.nl/pexels/52/5240642.jpeg?enable-io=true&enable=upscale&crop=1.4286%3A1&width=1200">
{% else %}
<meta property="og:image" content="https://primary.jwwb.nl/pexels/52/5240642.jpeg?enable-io=true&enable=upscale&crop=1.4286%3A1&width=1200">
{% endif %}
{% if page.layout == 'post' %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
{% endif %}

<!-- Twitter/X Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
{% if page.afbeelding %}
<meta name="twitter:image" content="{{ page.afbeelding | absolute_url }}">
{% else %}
<meta name="twitter:image" content="https://primary.jwwb.nl/pexels/52/5240642.jpeg?enable-io=true&enable=upscale&crop=1.4286%3A1&width=1200">
{% endif %}

hero:
  label: "Antwoorden"
  titel: "Veelgestelde vragen"
  subtitel: "Hier vind je antwoorden op de meest gestelde vragen. Staat jouw vraag er niet bij? Neem gerust contact op."

vragen:
  - vraag: "Hoe maak ik een afspraak?"
    antwoord: "Je kunt bellen, appen of mailen. Afspraken zijn mogelijk op maandag t/m vrijdag, soms ook in het weekend. WhatsApp werkt het snelst: 06 59 11 14 56."
  - vraag: "Voor welke klachten kan ik terecht?"
    antwoord: "Bij stress, vermoeidheid, slaapproblemen, nek- en schouderklachten, een vol hoofd of gewoon behoefte aan ontspanning en een moment voor jezelf. Twijfel je of een behandeling bij jou past? Neem gerust contact op."
  - vraag: "Kan ik meerdere behandelingen combineren?"
    antwoord: "Zeker. Combinaties zijn heel goed mogelijk en worden op maat afgestemd. Denk bijvoorbeeld aan een voetreflexmassage gecombineerd met Reiki, of een stoelmassage met Access Bars. Vraag ernaar tijdens het contact."
  - vraag: "Is het pijnlijk?"
    antwoord: "De meeste behandelingen zijn ontspannend en comfortabel. Bij een voetreflexmassage kunnen bepaalde punten gevoeliger zijn, maar de druk wordt altijd aangepast aan jouw comfortniveau. Het doel is altijd ontspanning."
  - vraag: "Wat doe ik tijdens de behandeling?"
    antwoord: "Niets — dat is het fijne eraan. Je mag ontspannen, wegdommelen of praten als je dat prettig vindt. Het belangrijkste is dat je je comfortabel voelt."
  - vraag: "Moet ik iets meenemen of me uitkleden?"
    antwoord: "Bij stoelmassage, Reiki en Access Bars blijf je gewoon gekleed. Bij voetreflexmassage is het handig om kleding te dragen waarbij de broekspijpen makkelijk oprollen tot boven de knie."
  - vraag: "Wat is Access Bars precies?"
    antwoord: "Access Bars is een zachte behandelmethode waarbij 32 specifieke punten op je hoofd zacht worden aangeraakt. Het helpt om opgeslagen gedachten, gevoelens en spanning los te laten. Veel mensen beschrijven het als 'alsof je hoofd opnieuw opstart'."
  - vraag: "Moet ik ergens in geloven voor Reiki werkt?"
    antwoord: "Nee. Een open houding kan de ervaring verdiepen, maar het is niet vereist. Reiki werkt onafhankelijk van overtuigingen."
  - vraag: "Hoe voelt een Reiki behandeling?"
    antwoord: "Cliënten ervaren vaak diepe ontspanning, warmte, tintelingen of een gevoel van rust. Sommigen vallen in slaap, anderen worden juist helderder. Elke ervaring is persoonlijk."
  - vraag: "Kan ik bijwerkingen verwachten?"
    antwoord: "Soms ervaren mensen na een sessie lichte vermoeidheid of emotionele reacties — dat is een teken dat het lichaam verwerkt en herstelt. Drink na de behandeling voldoende water."
  - vraag: "Zijn de behandelingen vergoed door de zorgverzekering?"
    antwoord: "Helaas niet. Alle tarieven zijn BTW-vrij. Voor regelmatige ontspanning zijn er aantrekkelijke strippenkaarten beschikbaar."
  - vraag: "Zijn er ook behandelingen voor kinderen?"
    antwoord: "Ja, er zijn speciale kindertarieven beschikbaar voor behandelingen van 30 of 60 minuten. Neem contact op voor meer informatie."
  - vraag: "Kan ik een cadeaubon kopen?"
    antwoord: "Ja! Een behandeling bij Hands4flow is een mooi cadeau. Neem contact op via WhatsApp of mail voor een cadeaubon op maat."
  - vraag: "Wat merk ik na afloop van een behandeling?"
    antwoord: "Dat verschilt per persoon en per sessie. Veel klanten voelen zich diep ontspannen, lichter of energieker. Anderen merken de effecten geleidelijk in de dagen daarna — minder spanning, beter slapen, meer rust in het hoofd."

contact:
  titel: "Nog een vraag?"
  tekst: "Staat jouw vraag er niet bij? Neem gerust contact op — ik help je graag verder."

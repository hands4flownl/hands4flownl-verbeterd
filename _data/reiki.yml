hero:
  label: "Behandeling"
  titel: "Reiki: universele levensenergie"
  subtitel: "Laad je energie op en herstel de balans in lichaam en geest."
  afbeelding: "https://primary.jwwb.nl/public/z/f/p/temp-umaagwfutijsnqmyiokx/img_20250103_231438-high.jpg?enable-io=true&enable=upscale&crop=1.4286%3A1%2Coffset-y69&width=800"

inhoud:
  intro_1: "Reiki is een vorm van energetische healing en heeft zijn oorsprong in Japan. Het woord Reiki bestaat uit twee Japanse karakters: Rei (universeel) en Ki (levensenergie) — samen staan ze voor universele levensenergie, de liefdevolle helende kracht die ons lichaam en geest ondersteunt bij herstel en balans."
  intro_2: "Reiki is zacht én krachtig. Deze energie is overal aanwezig, om ons heen en in onszelf. In andere culturen wordt dit ook wel Chi (China), Prana (India) of goddelijke energie genoemd."
  balans_titel: "Balans en herstel"
  balans_tekst_1: "Een Reiki behandeling ondersteunt niet alleen je fysieke lichaam, maar brengt ook balans op emotioneel, mentaal, energetisch en spiritueel niveau. Reiki helpt je om spanning los te laten, innerlijke rust te vinden en het zelfgenezend vermogen van je lichaam te activeren."
  balans_tekst_2: "De behandeling gebeurt via handoplegging, waarbij ik als Reiki behandelaar fungeer als kanaal. De energie stroomt precies naar die plekken waar het nodig is."
  voordelen_titel: "Voordelen van Reiki"
  voordelen:
    - item: "Helpt bij slaapproblemen"
    - item: "Activeert het zelfherstellend vermogen van het lichaam"
    - item: "Geeft ontspanning"
    - item: "Verlaagt het stressniveau"
    - item: "Verbetert algehele gezondheid"
    - item: "Vermindert de pijn"
    - item: "Verbetert de weerstand"
    - item: "Ondersteunt bij persoonlijke processen"
    - item: "Helpt bij rouwverwerking"
    - item: "Brengt je terug in contact met jezelf"
    - item: "Versterkt je intuïtie en energieniveau"
    - item: "Brengt rust in je hoofd"
  afstand_titel: "Reiki op afstand"
  afstand_tekst_1: "Reiki op afstand heeft dezelfde uitwerking als wanneer je fysiek een Reiki behandeling krijgt: vermindering van stress, meer balans tussen lichaam en geest en het zelfhelend vermogen van het lichaam wordt gestimuleerd."
  afstand_tekst_2: "Door het gebruik van symbolen, een intentie zetten en het noemen van de naam wordt een energetische verbinding tot stand gebracht."
  tips_titel: "Tips voor een Reiki behandeling"
  tips_tekst: "Na de behandeling is het fijn om rust in te plannen. Drink voldoende water om afvalstoffen af te voeren. Ik raad aan om warme sokken mee te nemen; dekens zijn aanwezig. Reiki mag niet gegeven worden wanneer je een pacemaker heeft. Ook bij koorts en 24 uur voor een operatie mag er geen Reiki gegeven worden."
  tarief: "Reiki behandeling 60 min — € 60,00\nReiki afstandsbehandeling 30 min — € 40,00\nStrippenkaart 5x (60 min): € 270,00 · 10x (60 min): € 540,00"

contact:
  titel: "Ervaar de Reiki flow"
  tekst: "Voel de universele levensenergie door je heen stromen. Bij hands4flow staat jouw welzijn centraal."

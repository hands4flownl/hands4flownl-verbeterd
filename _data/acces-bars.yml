hero:
  titel: "Acces Bars"
  subtitel: "Reset je lichaam en geest — druk een knop in en laat los."
  afbeelding: "https://primary.jwwb.nl/pexels/38/3865496.jpeg?enable-io=true&enable=upscale&crop=1.388%3A1%2Coffset-y40&width=800"

inhoud:
  intro_1: "Acces Bars is een energetische behandeling waarbij drukpunten op je hoofd zacht worden aangeraakt. Deze punten staan in contact met bepaalde thema's in het leven zoals o.a. controle, geld, creativiteit, verdriet en vreugde."
  intro_2: "Door het aanraken van die punten laat je beperkende patronen, gedachtes en overtuigingen met betrekking tot die thema's los. Hoe mooi is dat?"
  intro_3: "Je gaat beter slapen, komt meer in balans en laat stress en spanning los. Je zou het kunnen zien alsof je een knop indrukt en je lichaam reset."
  voordelen_titel: "Wat levert het op?"
  voordelen:
    - item: "Meer rust ervaren"
    - item: "Meer helderheid in je denken"
    - item: "Lichamelijke klachten kunnen verminderen"
    - item: "Beter slapen"
    - item: "Meer in balans komen"
    - item: "Stress en spanning loslaten"
  tarief: "60 minuten — € 60,00\nStrippenkaart 5x: € 270,00 · 10x: € 540,00"

contact:
  titel: "Ervaar de reset"
  tekst: "Neem contact op voor een Acces Bars behandeling bij hands4flow in Emmen."

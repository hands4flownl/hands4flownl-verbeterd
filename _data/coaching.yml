hero:
  label: "Coaching"
  titel: "Kom weer dichter bij jezelf"
  subtitel: "Rust, vertrouwen en inzicht via coaching bij hands4flow."

inhoud:
  tekst_1: "Ook voor coaching kun je terecht bij hands4flow in Emmen. Ik ben hiervoor opgeleid door José van Eldik in Valthe."
  tekst_2: "Door middel van gesprekken, gecombineerd met lichaamswerk zoals ademsessies en body drum release, kunnen er blokkades worden opgeruimd. Hierdoor kan er weer rust en vertrouwen ontstaan."
  tekst_3: "Daarnaast kan er inzicht komen door middel van een tafelopsteling, waarbij onzichtbare patronen zichtbaar en helder worden."

contact:
